services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: lore_memory
      POSTGRES_USER: lore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lore"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    profiles: ["local-embedding"]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${MCP_SERVER_PORT:-3100}:${MCP_SERVER_PORT:-3100}"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_LORE_API_URL: ${NEXT_PUBLIC_LORE_API_URL}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      mcp-server:
        condition: service_started

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
