services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: lore_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
