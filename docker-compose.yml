services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: lore_memory
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lore"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://lore:${POSTGRES_PASSWORD}@postgres:5432/lore_memory
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ADMIN_SECRET: ${ADMIN_SECRET}
      MCP_SERVER_PORT: ${MCP_SERVER_PORT:-3100}
      LORE_PG_VOLUME_BYTES: ${LORE_PG_VOLUME_BYTES:-0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${MCP_SERVER_PORT:-3100}:${MCP_SERVER_PORT:-3100}"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - mcp-server

volumes:
  postgres_data:
    driver: local
